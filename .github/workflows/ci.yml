name: Python CI/CD Pipeline


on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ... шаги сборки ...

  tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # ... шаги тестирования ...

  package:  # ← вставляем сюда, после tests
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create build
        run: |
          mkdir build
          cp -r src app.py requirements.txt build/
          cd build && zip -r app.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: build/app.zip
