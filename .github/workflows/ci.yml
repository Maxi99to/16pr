name: Python CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ...

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create build
        run: |
          mkdir build
          cp -r src app.py requirements.txt build/
          cd build && zip -r app.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: build/app.zip
