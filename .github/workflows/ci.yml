name: Python CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:  # или tests — зависит от вашего текущего названия
    runs-on: ubuntu-latest
    steps:
      # ... существующие шаги (checkout, setup Python, install deps, run tests)

  package:  # новый job — добавляем сюда
    needs: build  # указываем зависимость от job с тестами
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create build
        run: |
          mkdir build
          cp -r src app.py requirements.txt build/
          cd build && zip -r app.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: build/app.zip
